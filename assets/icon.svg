<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">CCLimitPing icon</title>
  <desc id="desc">A retro terminal-style limit window timeline with a glowing ping pulse.</desc>
  <defs>
    <radialGradient id="backgroundGlow" cx="50%" cy="48%" r="74%">
      <stop offset="0" stop-color="#0B1B24"/>
      <stop offset="0.44" stop-color="#050C14"/>
      <stop offset="1" stop-color="#010409"/>
    </radialGradient>
    <linearGradient id="edgeLight" x1="128" y1="78" x2="890" y2="936" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="0.44" stop-color="#28E8FF" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#35FF72" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="titleFill" x1="170" y1="112" x2="754" y2="398" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#EEF3F8"/>
      <stop offset="1" stop-color="#C9D3DC"/>
    </linearGradient>
    <linearGradient id="timeline" x1="122" y1="600" x2="892" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1FE6FF"/>
      <stop offset="0.5" stop-color="#48FFF1"/>
      <stop offset="1" stop-color="#1FE6FF"/>
    </linearGradient>
    <filter id="cyanGlow" x="-20%" y="-150%" width="140%" height="400%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="greenGlow" x="-140%" y="-180%" width="380%" height="460%">
      <feGaussianBlur stdDeviation="22" result="wide"/>
      <feGaussianBlur stdDeviation="7" in="SourceGraphic" result="tight"/>
      <feMerge>
        <feMergeNode in="wide"/>
        <feMergeNode in="tight"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="titleShadow" x="-12%" y="-24%" width="124%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="8" flood-color="#000000" flood-opacity="0.76"/>
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#FFFFFF" flood-opacity="0.2"/>
    </filter>
    <filter id="panelShadow" x="-20%" y="-60%" width="140%" height="220%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000000" flood-opacity="0.56"/>
    </filter>
    <pattern id="pixelGrid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#7CC8DA" stroke-opacity="0.045" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="1024" height="1024" rx="198" fill="url(#backgroundGlow)"/>
  <rect width="1024" height="1024" rx="198" fill="url(#pixelGrid)" opacity="0.54"/>
  <rect x="22" y="22" width="980" height="980" rx="180" fill="none" stroke="url(#edgeLight)" stroke-width="3"/>
  <circle cx="242" cy="640" r="230" fill="#1FE6FF" opacity="0.055"/>
  <circle cx="760" cy="520" r="270" fill="#35FF72" opacity="0.035"/>

  <g filter="url(#titleShadow)" fill="url(#titleFill)">
    <path d="M182 128H266V328H432V404H206L182 380Z"/>
    <path fill-rule="evenodd" clip-rule="evenodd"
          d="M486 128H688L744 184V292L688 348H572V404H486ZM572 204V272H650L664 258V218L650 204Z"/>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M126 600H880" stroke="#043C49" stroke-width="26" opacity="0.72"/>
    <path d="M126 600H880" stroke="url(#timeline)" stroke-width="9" filter="url(#cyanGlow)"/>
  </g>
  <path d="M880 570L926 600L880 630Z" fill="#25E7FF" filter="url(#cyanGlow)"/>

  <g stroke-linecap="round">
    <path d="M170 492V716" stroke="#7390A4" stroke-width="5" stroke-dasharray="15 16" opacity="0.72"/>
    <path d="M402 468V734" stroke="#7FCFE2" stroke-width="5" stroke-dasharray="15 16" opacity="0.68"/>
    <path d="M604 438V744" stroke="#35FF72" stroke-width="6" stroke-dasharray="16 16" opacity="0.88"/>
    <path d="M812 468V734" stroke="#7FCFE2" stroke-width="5" stroke-dasharray="15 16" opacity="0.68"/>
  </g>

  <g fill="#1FE6FF" opacity="0.95">
    <circle cx="402" cy="506" r="10"/>
    <circle cx="812" cy="506" r="10"/>
  </g>
  <circle cx="604" cy="474" r="13" fill="#35FF72" filter="url(#greenGlow)"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M356 600H382L394 568L408 648L426 600H452"
          stroke="#35FF72" stroke-width="12" opacity="0.84" filter="url(#greenGlow)"/>
    <path d="M558 600H588L600 558L616 656L634 600H672"
          stroke="#35FF72" stroke-width="17" filter="url(#greenGlow)"/>
    <path d="M766 600H792L804 568L818 648L836 600H862"
          stroke="#35FF72" stroke-width="12" opacity="0.84" filter="url(#greenGlow)"/>
  </g>

  <g fill="none" stroke-linecap="round">
    <path d="M500 456V536" stroke="#8DA4B8" stroke-width="5" stroke-dasharray="12 12" opacity="0.75"/>
    <path d="M704 456V536" stroke="#1FE6FF" stroke-width="5" stroke-dasharray="12 12" opacity="0.8"/>
  </g>
  <circle cx="500" cy="456" r="9" fill="#8DA4B8"/>
  <circle cx="704" cy="456" r="9" fill="#1FE6FF" filter="url(#cyanGlow)"/>
  <path d="M526 458H578" stroke="#8DA4B8" stroke-width="4" stroke-linecap="round" opacity="0.72"/>
  <path d="M632 458H682" stroke="#35FF72" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

  <g filter="url(#panelShadow)">
    <rect x="282" y="770" width="460" height="110" rx="24" fill="#02070E" fill-opacity="0.62"
          stroke="#6A8195" stroke-width="4" stroke-opacity="0.58"/>
    <path d="M340 812L386 844L340 876" fill="none" stroke="#35FF72" stroke-width="18"
          stroke-linecap="square" stroke-linejoin="miter"/>
    <path d="M414 870H476" stroke="#35FF72" stroke-width="12" stroke-linecap="square"/>
    <path d="M590 840L630 876L700 802" fill="none" stroke="#35FF72" stroke-width="17"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <path d="M150 600H200M378 600H426M582 600H632M790 600H834"
        stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.42"/>
</svg>
